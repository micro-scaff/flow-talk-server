; app.ini 是本地开发环境的主配置文件。
; 生产环境建议不要把真实密码直接提交到仓库，可以改成读取环境变量或独立的部署配置。

[mysql]
; MySQL 服务地址。当前本机数据库使用 127.0.0.1:3306。
host = 127.0.0.1
port = 3306

; 数据库账号信息。服务启动时会使用这些字段拼接 GORM 的 DSN。
username = root
password = admin

; 当前项目使用的数据库名，启动前需要先 CREATE DATABASE flow_talk。
database = flow_talk

; parse_time=true 可以让 MySQL 的 DATETIME/TIMESTAMP 正确扫描为 Go 的 time.Time。
parse_time = true

[http]
; Gin HTTP 服务监听地址。若 8080 被占用，可以改成 :8081 等空闲端口。
addr = :8080

; Gin 运行模式：debug / release / test。
mode = debug

[jwt]
; JWT HMAC 签名密钥。修改后，旧 token 会全部失效。
secret = dev-secret

; token 有效期，使用 Go duration 格式，例如 30m、2h、24h。
ttl = 24h
